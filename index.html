<!DOCTYPE html>
<html lang="en">
<head>
<title>Animal Reveal UI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="header-box">
    Welcome to the Interactive Reveal What’s that Animal UI
  </div>

  <div class="header-box">
    Click on the buttons below to reveal the animal images
  </div>

  <!-- Animal Displays -->
  <div id="catBox" class="animal-box left-box">
    <img src="tabby-cat.jpg">
    <button class="hide-btn" onclick="hideAnimal('cat')">Hide Result</button>
  </div>

  <div id="dogBox" class="animal-box center-box">
    <img src="dog.jpg">
    <button class="hide-btn" onclick="hideAnimal('dog')">Hide Result</button>
  </div>

  <div id="cowBox" class="animal-box right-box">
    <img src="cow.jpg">
    <button class="hide-btn" onclick="hideAnimal('cow')">Hide Result</button>
  </div>

  <!-- Buttons -->
  <div class="button-row">
    <button id="catBtn" class="btn left" onclick="showAnimal('cat')">Reveal a CAT</button>
    <button id="dogBtn" class="btn center" onclick="showAnimal('dog')">Reveal a DOG</button>
    <button id="cowBtn" class="btn right" onclick="showAnimal('cow')">Reveal a COW</button>
  </div>

  <!-- Bottom controls -->
  <div class="bottom-controls">
    <button class="reset-btn" onclick="resetZoo()">Reset Zoo</button>
    <div id="counter" class="counter-box">Animals on screen: 0</div>
  </div>

</div>

<script>
  let count = 0;

  function showAnimal(type) {
    const box = document.getElementById(type + "Box");
    const btn = document.getElementById(type + "Btn");

    if (box.style.display !== "block") {
      box.style.display = "block";
      btn.classList.add("active");
      count++;
      updateCounter();
    }
  }

  function hideAnimal(type) {
    const box = document.getElementById(type + "Box");
    const btn = document.getElementById(type + "Btn");

    box.style.display = "none";
    btn.classList.remove("active");
    count--;
    updateCounter();
  }

  function resetZoo() {
    ["cat", "dog", "cow"].forEach(type => {
      document.getElementById(type + "Box").style.display = "none";
      document.getElementById(type + "Btn").classList.remove("active");
    });

    count = 0;
    updateCounter();
  }

  function updateCounter() {
    document.getElementById("counter").innerText =
      "Animals on screen: " + count;
  }
</script>

</body>
</html>
